<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playground - Counter</title>
  <script src="https://cdn.tailwindcss.com/3.4.15"></script>
  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>
  <script src="js/icons.js"></script> 
  <script src="js/vanilla-reactive.iife.js"></script>
  <script src="js/app-components/theme-toggle-component.js"></script>

  <style>
    body { visibility: hidden; }
  </style>

  <script>
    const { 
      BaseComponent, 
      buildAndInterpolate,
      resolveBindingValue, 
      registerComponent, 
      hydrateElement,
    } = VanillaReactive;

    // Componente counter usando factory function
    const CounterComponent = function () {
      const self = {
        count: 0,
        bindings: [],
        decrement() {
          self.count--;
          self.updateBindings();
        },
        increment() {
          self.count++;
          self.updateBindings();
        },
        updateBindings() {
          self.bindings.forEach(b => resolveBindingValue(b, self));
        },
        init() {},
        render() {
          return buildAndInterpolate(`
            <div class="flex items-center gap-4 p-4 bg-white dark:bg-gray-800 rounded-lg shadow">
              <button on-click="decrement" class="px-4 py-2 bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400 rounded hover:bg-red-200 dark:hover:bg-red-900/50 font-bold text-xl">
                <i data-icon="minus" class="size-5"></i>
              </button>
              <span data-bind="text:count" class="text-3xl font-mono font-bold w-12 text-center dark:text-gray-100"></span>
              <button on-click="increment" class="px-4 py-2 bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 rounded hover:bg-green-200 dark:hover:bg-green-900/50 font-bold text-xl">
                <i data-icon="plus" class="size-5"></i>
              </button>
            </div>
          `, self);
        },
        mounted() {},
        destroy() {}
      };
      return self;
    };

    VanillaReactive.initApp([
      () => {
        registerComponent('counter-component', CounterComponent);
        hydrateElement(document.body, {});
      }
    ]);

  </script>

</head>

<body class="bg-gray-100 dark:bg-gray-900 min-h-screen p-8 transition-colors">
  <div class="max-w-xl mx-auto space-y-6">

    <nav class="flex items-center justify-between text-sm text-gray-500 dark:text-gray-400">
      <a href="index.html" class="text-blue-600 dark:text-blue-400 hover:underline">
        <i data-icon="chevron-left" class="inline-flex"></i> Playground
      </a>
      <div data-component="theme-toggle-component"></div>
    </nav>

    <h1 class="text-3xl font-bold text-gray-800 dark:text-gray-100">
      <i data-icon="timer" class="size-10 inline-flex"></i> Playground - Counter con IIFE
    </h1>

    <div data-component="counter-component"></div>

  </div>

</body>

</html>
