<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playground - Todo List</title>
  <script src="https://cdn.tailwindcss.com/3.4.15"></script>
  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>
  <script src="js/icons.js"></script>  
  <script src="js/vanilla-reactive.iife.js"></script>
  <script src="js/app-components/todo-list-component.js"></script>
  <script src="js/app-components/theme-toggle-component.js"></script>

  <style>
    body { visibility: hidden; }
  </style>

  <script>

    VanillaReactive.initApp([
      () => {
        VanillaReactive.hydrateElement(document.body, {});
      }
    ]);
  </script>
  
</head>

<body class="bg-gray-100 dark:bg-gray-900 min-h-screen p-8 transition-colors">
  <div class="max-w-xl mx-auto space-y-6">

    <nav class="flex items-center justify-between text-sm text-gray-500 dark:text-gray-400">
      <a href="index.html" class="text-blue-600 dark:text-blue-400 hover:underline">
        <i data-icon="chevron-left" class="inline-flex size-8"></i> Playground
      </a>
      <div data-component="theme-toggle-component"></div>
    </nav>

    <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100">Todo List con BaseComponent (IIFE)</h1>

    <div data-component="todo-component"></div>

  </div>

</body>

</html>
