<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeGen</title>
  <script src="https://cdn.tailwindcss.com/3.4.15"></script>
  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>
  <script src="../icons.js"></script>
  <script src="../vanilla-reactive.iife.js"></script>
  <script src="../app-components-bundle.js"></script>
  <script src="index.js"></script>

  <link rel="stylesheet" href="../../css/app.css">
  <style>
    body { visibility: hidden; }
  </style>

  <script>

    const { $ } = VanillaReactive.dom;
    const { BaseComponent, buildAndInterpolate, registerComponent } = VanillaReactive;

    // ==============================================================================
    // Custom component to copy text to clipboard
    // ==============================================================================
    class CopyTextComponent extends BaseComponent {

      mode = 'copy';
      
      constructor(ctx) { 
        super(ctx); 
      }

      init(ctx) {
        super.init(ctx);
        this.mode = this.props.mode === 'download' ? 'download' : 'copy';
      }

      animateIcon() {
        const icon = $('svg', this.element).one();
        if (icon) {
          icon.classList.add('animate-spin');
          setTimeout(() => icon.classList.remove('animate-spin'), 500);
        }
      }

      resolveText() {
        if (this.props.target)
          return $(this.props.target).one()?.innerText || '';
        else
          return this.textProvider ? this.textProvider() : '';
      }

      copy() {
        const text = this.resolveText();
        if (navigator.clipboard && text) {
          navigator.clipboard.writeText(text).then(() => {
            this.animateIcon();
          }).catch(err => {
            alert('Error al copiar al portapapeles: ' + err);
          });
        }
      }

      download() {
        const text = this.resolveText();
        if (!text) return;
        const content = '\uFEFF' + text; // Add BOM for UTF-8
        const blob = new Blob([content], { type: 'text/plain' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'codegen-output.txt';
        a.click();
        this.animateIcon();
      }

      render() {
        const template = `
          <button 
            on-click="{mode}"
            class="p-2 hover:bg-gray-400 dark:hover:bg-gray-900 rounded-md transition-all">
            <i data-icon="{mode}" class="size-5 block"></i>
          </button>
        `;
        return buildAndInterpolate(template, this);
      }

    }
    
    registerComponent('copy-component', CopyTextComponent);

    const entities = [
      {
        itemName: "Categoria",
        collectionName: "Categorias",
        tableName: "[CategoriasProducto]",
        properties: [
          { name: "Id", dbType: "long", dbName: "Id" },
          { name: "Codigo", dbType: "string", dbName: "Codigo" },
          { name: "Descripcion", dbType: "string", dbName: "Descripcion" },
          { name: "Orden", dbType: "int", dbName: "Orden" }
        ]
      },
      {
        itemName: "Moneda",
        collectionName: "Monedas",
        tableName: "[Monedas]",
        properties: [
          { name: "Id", dbType: "long", dbName: "Id" },
          { name: "Codigo", dbType: "string", dbName: "Codigo" },
          { name: "Descripcion", dbType: "string", dbName: "Descripcion" }
        ]
      }
    ];
    
    const json = JSON.stringify(entities, null, 2);
    const xml = `
<Entyties>
  <Entity itemName="Categoria" collectionName="Categorias" tableName="[CategoriasProducto]">
    <Properties>
      <Property name="Id" dbType="long" dbName="Id" />
      <Property name="Codigo" dbType="string" dbName="Codigo" />
      <Property name="Descripcion" dbType="string" dbName="Descripcion" />
      <Property name="Orden" dbType="int" dbName="Orden" />
    </Properties>
  </Entity>
  <Entity itemName="Departamento" collectionName="Departamentos" tableName="[Departamentos]">
    <Properties>
      <Property name="Id" dbType="long" dbName="Id" />
      <Property name="Codigo" dbType="string" dbName="Codigo" />
      <Property name="Descripcion" dbType="string" dbName="Descripcion" />
    </Properties>
  </Entity>
</Entyties>
    `;

    function clearCode() {
      ctx.result = '';
      ctx.files = [];
      ctx.updateBindings();
    }

    function showFile(el, ev, filename){
      const file = ctx.files.find(f => f.fileName === filename);
      if (file) {
        ctx.result = file.content;
        ctx.updateBindings();
      }
    };

    function populate(template, ctx, el) {
      const rendered = VanillaReactive.buildAndInterpolate(template, ctx);
      el.innerHTML = '';
      while (rendered.firstChild) el.appendChild(rendered.firstChild);
    }

    function updateFileList(el){
      populate(`
          <div data-each="file in files">
            <div 
              on-click="showFile:@file.fileName" 
              class="px-3 py-1.5 text-sm font-mono rounded-md cursor-pointer 
                truncate lg:w-full
                bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 
                hover:bg-indigo-100 dark:hover:bg-indigo-900/40 hover:text-indigo-700 
                dark:hover:text-indigo-300 border border-transparent hover:border-indigo-300 
                dark:hover:border-indigo-600 transition-all"
              >
              {file.fileName}
            </div>
          </div>
        `, ctx, el
      );
    }

    function generateCode() {
      const xmlInput = $('#xml-input').one().value;
      try {      
        const isXml = xmlInput.trim().startsWith('<');
        ctx.files = isXml ? codeGen.generateFromXml(xmlInput) 
                          : codeGen.generate(JSON.parse(xmlInput));
        ctx.result = ctx.files.map(file => `// ${file.fileName}\n${file.content}`).join('\n\n');
      } catch (error) {
        ctx.result = `Error: ${error.message}`;
        ctx.files = [];
      }
      ctx.updateBindings();
    }

    function resolveCode() {
      return ctx.result;
    }

    function setJson() {
      ctx.schema = json;
      ctx.updateBindings();
    }

    function setXml() {
      ctx.schema = xml;
      ctx.updateBindings();
    }

    const ctx = {
      updateBindings() {
        this.bindings?.forEach(binding => {
          VanillaReactive.resolveBindingValue(binding, this);
        });
      },
      schema: xml,
      result: '',
      generateCode,
      clearCode,
      setJson,
      setXml,
      showFile,
      updateFileList,
      resolveCode
    };

    VanillaReactive.initApp([
      () => {
        VanillaReactive.hydrateElement(document.body, ctx);
      },
      function onDocumentReady() { },
    ]);

  </script>

</head>

<body class="transition-colors font-sans min-h-screen flex flex-col">
  <header class="px-6 py-4 flex items-center gap-4 border-b border-gray-200 dark:border-gray-700 ">
    <a href="../../index.html" 
      class="px-5 py-2 text-sm font-medium rounded-lg bg-indigo-600 text-white hover:bg-indigo-700 active:bg-indigo-800 shadow-sm hover:shadow transition-all"
      >
      Home
    </a>
    <h1 class="text-xl font-bold tracking-tight flex-1">CodeGen Playground</h1>
    <div data-component="clock-component"></div>
    <div data-component="theme-toggle-component" class=""></div>
    <a href="https://webapivanillajs2026-axhxdzg8h5fub7hj.canadacentral-01.azurewebsites.net/index.html" 
      class="px-5 py-2 text-sm font-medium rounded-lg bg-indigo-600 text-white hover:bg-indigo-700 active:bg-indigo-800 shadow-sm hover:shadow transition-all"
      target="_blank">
      Azure
    </a>
    
  </header>

  <div class="flex-1 flex flex-col p-4 gap-4 max-w-screen-2xl mx-auto w-full">

    <!-- Action buttons -->
    <div class="flex flex-wrap gap-2">
      <button 
        class="px-5 py-2 text-sm font-medium rounded-lg bg-indigo-600 text-white hover:bg-indigo-700 active:bg-indigo-800 shadow-sm hover:shadow transition-all" 
        on-click="generateCode">
        Generar Código
      </button> 
      <button 
        class="px-5 py-2 text-sm font-medium rounded-lg bg-gray-500 text-white hover:bg-gray-600 active:bg-gray-700 shadow-sm hover:shadow transition-all" 
        on-click="clearCode">
        Limpiar
      </button>
      <div class="w-px bg-gray-300 dark:bg-gray-600 mx-1 hidden sm:block"></div>
      <button 
        class="px-5 py-2 text-sm font-medium rounded-lg border border-indigo-300 dark:border-indigo-600 text-indigo-700 dark:text-indigo-300 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 active:bg-indigo-100 transition-all" 
        on-click="setJson">
        JSON
      </button>
      <button 
        class="px-5 py-2 text-sm font-medium rounded-lg border border-indigo-300 dark:border-indigo-600 text-indigo-700 dark:text-indigo-300 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 active:bg-indigo-100 transition-all" 
        on-click="setXml">
        XML
      </button>  
    </div> 

    <!-- Schema input -->
    <div 
      data-component="collapsible-component" 
      data-expanded="true"
      data-padding="p-2"
      data-title="Entidades" 
      class="">
      <div>
        <label for="xml-input" class="block mb-2 text-sm font-semibold text-gray-700 dark:text-gray-300 uppercase tracking-wide">Schema (XML / JSON):</label>
        <textarea 
          data-bind="value:schema" 
          id="xml-input"
          spellcheck="false"
          class="w-full h-80 resize-none p-3 border border-gray-300 dark:border-gray-600 rounded-lg no-resize font-mono text-sm bg-white dark:bg-gray-900 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-shadow whitespace-pre" 
          placeholder="<Entities>...</Entities>"></textarea>
      </div>
    </div>

    <div data-component="collapsible-component" 
      data-expanded="true" 
      data-padding="p-1"
      data-title="Código" 
      class="">

      <div
        class="p-4"
        data-bind="hide:result">
        <i data-icon="circle-help" class="size-8 inline-block"> </i> Presiona el botón "Generar Código" para ver el resultado aquí.
      </div>

      <!-- Output: sidebar + code -->
      <div data-bind="show:result"
        class="flex-1 flex flex-col lg:flex-row min-h-[400px]">
        
        <!-- File list sidebar -->
        <aside class="w-full lg:w-56 shrink-0 m-2">
          <nav data-bind="fn:updateFileList" class="flex flex-row lg:flex-col flex-wrap gap-1.5 bg-white dark:bg-gray-900 lg:max-h-none overflow-auto">
            <!-- File list will be rendered here -->
          </nav>
        </aside>

        <!-- Code output -->
        <div class="flex-1 min-w-0 m-2 relative">
          <div class="absolute top-2 right-4 flex gap-1 bg-gray-100 dark:bg-gray-800/70 rounded-md p-1 z-10">
            <div data-component="copy-component" data-mode="download" data-target="#code-output"></div>
            <div data-component="copy-component" (text-provider)="resolveCode"></div>            
          </div>
          <pre 
            id="code-output"
            data-bind="text:result"
            class="
              w-full h-full min-h-[400px] rounded-lg p-4 bg-gray-200 dark:bg-gray-800/70 text-gray-800 
              dark:text-gray-200 font-mono text-sm leading-relaxed overflow-auto
            ">
          </pre>        
        </div>

      </div>    
    <div>

  </div>

</body>

</html>
